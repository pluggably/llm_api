openapi: 3.1.0
info:
  title: Pluggably LLM API Gateway
  version: 0.1.0
  description: |
    Standard API for text, image, and 3D generation via commercial, public, or local OSS models.

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /v1/generate:
    post:
      summary: Generate text, image, or 3D output
      operationId: generate
      tags: [Generation]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Successful generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/BackendUnavailable'

  /v1/models:
    get:
      summary: List available models and capabilities
      operationId: listModels
      tags: [Models]
      security:
        - apiKey: []
      parameters:
        - name: modality
          in: query
          schema:
            type: string
            enum: [text, image, 3d]
      responses:
        '200':
          description: Model catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCatalog'

  /v1/models/{modelId}:
    get:
      summary: Get detailed model information
      operationId: getModelInfo
      tags: [Models]
      security:
        - apiKey: []
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
        '404':
          description: Model not found

  /v1/models/{modelId}/default:
    post:
      summary: Set the default model for the model's modality
      operationId: setDefaultModel
      tags: [Models]
      security:
        - apiKey: []
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated model info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'

  /v1/schema:
    get:
      summary: Get API schema and parameter documentation
      operationId: getSchema
      tags: [Operations]
      security:
        - apiKey: []
      responses:
        '200':
          description: API schema and parameter documentation
          content:
            application/json:
              schema:
                type: object

  /v1/sessions:
    post:
      summary: Create a new session
      operationId: createSession
      tags: [Sessions]
      security:
        - apiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                system_prompt:
                  type: string
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
    get:
      summary: List sessions
      operationId: listSessions
      tags: [Sessions]
      security:
        - apiKey: []
      responses:
        '200':
          description: Sessions list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'

  /v1/sessions/{sessionId}:
    get:
      summary: Get session details
      operationId: getSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
    delete:
      summary: Close a session
      operationId: closeSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
    put:
      summary: Update session metadata (e.g. title)
      operationId: updateSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found

  /v1/sessions/{sessionId}/reset:
    post:
      summary: Reset session context
      operationId: resetSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'

  /v1/sessions/{sessionId}/generate:
    post:
      summary: Generate with session context
      operationId: generateWithSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Successful generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'

  /v1/sessions/{sessionId}/regenerate:
    post:
      summary: Re-generate the last assistant response in a session
      operationId: regenerateWithSession
      tags: [Sessions]
      security:
        - apiKey: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                parameters:
                  type: object
                stream:
                  type: boolean
                  default: false
                selection_mode:
                  type: string
                  enum: [auto, free_only, commercial_only, model]
      responses:
        '200':
          description: Re-generated response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: No messages to regenerate or session closed
        '404':
          description: Session not found

  /v1/providers:
    get:
      summary: List supported providers and their configuration/credential status for the current user
      operationId: listProviders
      tags: [Providers]
      security:
        - apiKey: []
      responses:
        '200':
          description: Provider status list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvidersResponse'

  /v1/features:
    get:
      summary: Get backend feature flags
      operationId: getFeatureFlags
      tags: [Operations]
      security:
        - apiKey: []
      responses:
        '200':
          description: Feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  local_models_enabled:
                    type: boolean
                  huggingface_hosted_3d_supported:
                    type: boolean

  /v1/models/download:
    post:
      summary: Download and register a new model
      operationId: downloadModel
      tags: [Models]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelDownloadRequest'
      responses:
        '202':
          description: Download job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadJobStatus'

  /v1/models/search:
    get:
      summary: Search for models on Hugging Face
      operationId: searchModels
      tags: [Models]
      security:
        - apiKey: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            default: huggingface
        - name: modality
          in: query
          schema:
            type: string
            enum: [text, image, 3d]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        tags:
                          type: array
                          items:
                            type: string
                        modality_hints:
                          type: array
                          items:
                            type: string
                        hf_hosted_supported:
                          type: boolean
                          nullable: true
                        downloads:
                          type: integer
                          nullable: true
                  next_cursor:
                    type: string
                    nullable: true

  /v1/jobs:
    get:
      summary: List all download jobs
      operationId: listJobs
      tags: [Jobs]
      security:
        - apiKey: []
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/DownloadJobStatus'

  /v1/jobs/{jobId}:
    get:
      summary: Get download job status
      operationId: getJobStatus
      tags: [Jobs]
      security:
        - apiKey: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadJobStatus'
    delete:
      summary: Cancel download job
      operationId: cancelJob
      tags: [Jobs]
      security:
        - apiKey: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadJobStatus'

  /v1/artifacts/{artifactId}:
    get:
      summary: Get artifact content as raw bytes (image/png, image/jpeg, image/webp, etc.)
      operationId: getArtifact
      tags: [Artifacts]
      parameters:
        - name: artifactId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact content
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Artifact not found

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Operations]
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      summary: Readiness check
      operationId: readinessCheck
      tags: [Operations]
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready

  # ── Model Lifecycle ──────────────────────────────────────────────────────────

  /v1/models/{modelId}/status:
    get:
      summary: Get model runtime status (unloaded/loading/loaded/busy)
      operationId: getModelRuntimeStatus
      tags: [Lifecycle]
      security:
        - apiKey: []
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Model runtime status
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                  runtime_status:
                    type: string
                    enum: [unloaded, loading, loaded, busy]
                  queue_depth:
                    type: integer
        '404':
          description: Model not found

  /v1/models/{modelId}/load:
    post:
      summary: Pre-load a model into memory
      operationId: loadModel
      tags: [Lifecycle]
      security:
        - apiKey: []
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                wait:
                  type: boolean
                  default: false
                use_fallback:
                  type: boolean
                  default: false
                fallback_model_id:
                  type: string
      responses:
        '200':
          description: Model loaded or already loaded
        '202':
          description: Load started asynchronously
        '404':
          description: Model not found

  /v1/models/{modelId}/unload:
    post:
      summary: Unload a model from memory
      operationId: unloadModel
      tags: [Lifecycle]
      security:
        - apiKey: []
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
        - name: force
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Model unloaded
        '400':
          description: Cannot unload (pinned or busy)

  /v1/models/loaded:
    get:
      summary: List currently loaded models with memory stats
      operationId: listLoadedModels
      tags: [Lifecycle]
      security:
        - apiKey: []
      responses:
        '200':
          description: Loaded model list
          content:
            application/json:
              schema:
                type: object
                properties:
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        model_id:
                          type: string
                        loaded_at:
                          type: string
                          format: date-time
                        last_used_at:
                          type: string
                          format: date-time
                        is_pinned:
                          type: boolean
                        memory_bytes:
                          type: integer
                        is_busy:
                          type: boolean

  # ── Request Queue ────────────────────────────────────────────────────────────

  /v1/requests/{requestId}/status:
    get:
      summary: Get status and queue position of a request
      operationId: getRequestStatus
      tags: [Lifecycle]
      security:
        - apiKey: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request status
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  status:
                    type: string
                    enum: [pending, queued, running, completed, cancelled, failed]
                  queue_position:
                    type: integer
                    nullable: true
        '404':
          description: Request not found

  /v1/requests/{requestId}/cancel:
    post:
      summary: Cancel a queued or in-flight request
      operationId: cancelRequest
      tags: [Lifecycle]
      security:
        - apiKey: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                  cancelled:
                    type: boolean
                  status:
                    type: string
        '404':
          description: Request not found

  # ── Runtime Cache ────────────────────────────────────────────────────────────

  /v1/runtime-cache:
    get:
      summary: Get LRU cache statistics for local model caches
      operationId: getRuntimeCache
      tags: [Lifecycle]
      security:
        - apiKey: []
      responses:
        '200':
          description: Cache statistics per model type
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    hits:
                      type: integer
                    misses:
                      type: integer
                    maxsize:
                      type: integer
                    currsize:
                      type: integer
    delete:
      summary: Clear all LRU-cached local model objects from memory
      operationId: clearRuntimeCache
      tags: [Lifecycle]
      security:
        - apiKey: []
      responses:
        '200':
          description: Cache cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: object
                  message:
                    type: string

  # ── User / Auth ──────────────────────────────────────────────────────────────

  /v1/users/register:
    post:
      summary: Register a new user account
      operationId: registerUser
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                password:
                  type: string
                  format: password
                invite_token:
                  type: string
                display_name:
                  type: string
      responses:
        '201':
          description: User registered
        '400':
          description: Registration failed (invalid invite token or duplicate username)

  /v1/users/login:
    post:
      summary: Authenticate and obtain an API token
      operationId: loginUser
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Use as X-API-Key on subsequent requests
                  user:
                    type: object
        '401':
          description: Invalid credentials

  /v1/users/me:
    get:
      summary: Get current user profile
      operationId: getProfile
      tags: [Auth]
      security:
        - apiKey: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
    patch:
      summary: Update current user profile
      operationId: updateProfile
      tags: [Auth]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                preferred_model:
                  type: string
                preferences:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'

  /v1/users/change-password:
    post:
      summary: Change current user password
      operationId: changePassword
      tags: [Auth]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password changed
        '400':
          description: Invalid current password

  /v1/users/tokens:
    get:
      summary: List API tokens for the current user
      operationId: listTokens
      tags: [Auth]
      security:
        - apiKey: []
      responses:
        '200':
          description: Token list
    post:
      summary: Create a new API token
      operationId: createToken
      tags: [Auth]
      security:
        - apiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                expires_days:
                  type: integer
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Shown only once
                  info:
                    type: object

  /v1/users/tokens/{tokenId}:
    delete:
      summary: Revoke an API token
      operationId: revokeToken
      tags: [Auth]
      security:
        - apiKey: []
      parameters:
        - name: tokenId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token revoked
        '404':
          description: Token not found

  /v1/users/provider-keys:
    get:
      summary: List provider API keys for the current user
      operationId: listProviderKeys
      tags: [Auth]
      security:
        - apiKey: []
      responses:
        '200':
          description: Provider key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderKeyInfo'
    post:
      summary: Add or update a provider API key
      operationId: setProviderKey
      tags: [Auth]
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderKeyRequest'
      responses:
        '201':
          description: Key saved
        '400':
          description: Missing required credential fields

  /v1/users/provider-keys/{provider}:
    delete:
      summary: Delete a provider API key
      operationId: deleteProviderKey
      tags: [Auth]
      security:
        - apiKey: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Key deleted
        '404':
          description: Provider key not found

  /v1/users/invites:
    post:
      summary: Create an invite token (admin only)
      operationId: createInvite
      tags: [Auth]
      security:
        - apiKey: []
      responses:
        '201':
          description: Invite token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite_token:
                    type: string
        '403':
          description: Admin privileges required

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    GenerateRequest:
      type: object
      required: [modality, input]
      properties:
        model:
          type: string
          description: Model ID (optional; uses default if omitted). Supports provider:model format (e.g. "groq:llama-3.3-70b-versatile") or auto-detection (e.g. "gpt-4" → openai, "claude-3" → anthropic).
        provider:
          type: string
          description: Provider preference (optional; used with or without model). Supported values - openai, anthropic, google, azure, xai, deepseek, groq, huggingface, local.
        session_id:
          type: string
          description: Optional session ID to reuse conversation context
        state_tokens:
          type: object
          additionalProperties: true
          description: Optional provider/model-specific state passthrough
        modality:
          type: string
          enum: [text, image, 3d]
        input:
          type: object
          properties:
            prompt:
              type: string
            images:
              type: array
              items:
                type: string
                format: byte
            mesh:
              type: string
        parameters:
          type: object
          properties:
            temperature:
              type: number
            max_tokens:
              type: integer
            format:
              type: string
        system_prompt:
          type: string
          description: System/instruction prompt. Overrides any session-level system prompt.
        selection_mode:
          type: string
          enum: [auto, free_only, commercial_only, model]
          description: Controls how the backend selects a model. "auto" uses provider/model hints; "free_only" restricts to local/HF-free; "commercial_only" requires a configured provider key; "model" requires an explicit model ID.
        stream:
          type: boolean
          default: false
          description: Stream response as Server-Sent Events (SSE). Each event is a JSON object; the final event is "[DONE]".

    GenerateResponse:
      type: object
      properties:
        request_id:
          type: string
        model:
          type: string
        modality:
          type: string
        session_id:
          type: string
        state_tokens:
          type: object
          additionalProperties: true
        selection:
          type: object
          description: Selection metadata (provider/vendor and fallback)
          properties:
            selected_model:
              type: string
            selected_provider:
              type: string
            fallback_used:
              type: boolean
            fallback_reason:
              type: string
        credits_status:
          type: object
          description: Provider credit/usage status when available
          properties:
            provider:
              type: string
            status:
              type: string
              enum: [available, exhausted, rate_limited, unknown]
            remaining:
              type: number
              nullable: true
            reset_at:
              type: string
              format: date-time
              nullable: true
        output:
          type: object
          properties:
            text:
              type: string
            images:
              type: array
              items:
                type: string
                format: byte
            mesh:
              type: string
            artifacts:
              type: array
              items:
                $ref: '#/components/schemas/Artifact'
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    Artifact:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [image, mesh]
        url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time

    ModelCatalog:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelInfo'
        next_cursor:
          type: string
          nullable: true

    ProvidersResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderStatus'

    ProviderStatus:
      type: object
      properties:
        name:
          type: string
        configured:
          type: boolean
        supported_modalities:
          type: array
          items:
            type: string
            enum: [text, image, 3d]

    ModelInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        modality:
          type: string
          enum: [text, image, 3d]
        provider:
          type: string
        capabilities:
          type: object
          properties:
            max_context_tokens:
              type: integer
            output_formats:
              type: array
              items:
                type: string
            hardware_requirements:
              type: array
              items:
                type: string
        source:
          type: object
          properties:
            type:
              type: string
              enum: [huggingface, url, local]
            uri:
              type: string
        size_bytes:
          type: integer
        local_path:
          type: string
        last_used_at:
          type: string
          format: date-time
        is_default:
          type: boolean
        status:
          type: string
          enum: [available, downloading, failed, disabled, evicted]
        availability:
          type: object
          description: Provider access and credit status for this user (if applicable)
          properties:
            provider:
              type: string
            access:
              type: string
              enum: [available, locked, unknown]
            credits_status:
              type: object
              properties:
                status:
                  type: string
                  enum: [available, exhausted, rate_limited, unknown]
                remaining:
                  type: number
                  nullable: true
                reset_at:
                  type: string
                  format: date-time
                  nullable: true

    ModelDownloadRequest:
      type: object
      required: [model, source]
      properties:
        model:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            version:
              type: string
            modality:
              type: string
              enum: [text, image, 3d]
        source:
          type: object
          properties:
            type:
              type: string
              enum: [huggingface, url, local]
            id:
              type: string
            uri:
              type: string
        options:
          type: object
          properties:
            revision:
              type: string
            sha256:
              type: string
            allow_large:
              type: boolean

    DownloadJobStatus:
      type: object
      properties:
        job_id:
          type: string
        model_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        progress_pct:
          type: number
        error:
          type: string

    Session:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [active, closed]
        title:
          type: string
          nullable: true
        system_prompt:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true
        message_count:
          type: integer
          default: 0
        messages:
          type: array
          nullable: true
          items:
            type: object
            properties:
              id:
                type: string
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
              created_at:
                type: string
                format: date-time

    SessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'

    UserProfile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        preferred_model:
          type: string
          nullable: true
        preferences:
          type: object
          additionalProperties: true

    ProviderKeyRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          description: Provider identifier. Supported values - openai, anthropic, google, azure, xai, deepseek, groq, huggingface.
        credential_type:
          type: string
          enum: [api_key, endpoint_key, oauth_token, service_account]
          default: api_key
        api_key:
          type: string
          format: password
          description: Required for credential_type=api_key or endpoint_key
        endpoint:
          type: string
          description: Required for credential_type=endpoint_key (e.g. Azure OpenAI deployment URL)
        oauth_token:
          type: string
          description: Required for credential_type=oauth_token
        service_account_json:
          type: string
          description: Required for credential_type=service_account (Google service account JSON)

    ProviderKeyInfo:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        credential_type:
          type: string
        masked_key:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

  responses:
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
              details:
                type: array
                items:
                  type: object

    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string

    BackendUnavailable:
      description: Backend provider unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              code:
                type: string
              retry_after:
                type: integer
